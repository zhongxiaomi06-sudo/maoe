id: quality.deterministic-verification
version: 1.0.0
kind: workflow
description: Verify changed source and test evidence with deterministic quality gates.
capabilities:
  provides: [quality.report]
  requires: [source.modified, test.report]
  schemas:
    source.modified: source-tree/python-v1
    test.report: test-report/pytest-v1
    quality.report: quality-report/v1
inputs: {test_report: {type: test-report/pytest-v1, required: true}}
outputs: {quality_report: {type: quality-report/v1, required: true}}
effects: {filesystem: read, network: none, external_side_effects: false}
resources: {expected_tokens: 1200, expected_seconds: 8, expected_cost: 0.0015}
risk: {level: low}
quality: {validators: [quality_report_schema_valid, deterministic_checks_present], minimum_score: 0.92}
certification: trusted
compatible_agents: [test-agent, review-agent]
languages: [python]
task_types: [feature, bugfix, refactor]
tags: [quality, verification]
context_cost: 700
historical_success: 0.96
