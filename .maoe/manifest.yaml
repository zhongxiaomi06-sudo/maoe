version: "0.1"
project: "MAOE"
runtime: "skill-native-workflow-compiler"
core_files:
  - path: "MAOE.md"
    reason: "mandatory"
  - path: "AGENTS.md"
    reason: "mandatory"
  - path: "RULES.md"
    reason: "mandatory"
  - path: "SOUL.md"
    reason: "mandatory"
  - path: "WORKING-CONTEXT.md"
    reason: "session_state"
  - path: "COMMANDS-QUICK-REF.md"
    reason: "command_index"
agents:
  - name: "planner"
    path: "agents/planner.md"
  - name: "architect"
    path: "agents/architect.md"
  - name: "code-agent"
    path: "agents/code-agent.md"
  - name: "test-agent"
    path: "agents/test-agent.md"
  - name: "review-agent"
    path: "agents/review-agent.md"
  - name: "debug-agent"
    path: "agents/debug-agent.md"
  - name: "research-agent"
    path: "agents/research-agent.md"
  - name: "loop-operator"
    path: "agents/loop-operator.md"
commands:
  - name: "build"
    path: "commands/build.md"
  - name: "plan"
    path: "commands/plan.md"
  - name: "route"
    path: "commands/route.md"
  - name: "run"
    path: "commands/run.md"
  - name: "resume"
    path: "commands/resume.md"
  - name: "report"
    path: "commands/report.md"
skills:
