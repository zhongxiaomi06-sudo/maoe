    path: "skills/task-decomposition/SKILL.md"
    capsule: "skills/task-decomposition/capsule.yaml"
  - name: "cost-aware-routing"
    path: "skills/cost-aware-routing/SKILL.md"
    capsule: "skills/cost-aware-routing/capsule.yaml"
  - name: "python-tdd"
    path: "skills/python-tdd/SKILL.md"
    capsule: "skills/python-tdd/capsule.yaml"
  - name: "quality-verification"
    path: "skills/quality-verification/SKILL.md"
    capsule: "skills/quality-verification/capsule.yaml"
  - name: "recovery-loop"
    path: "skills/recovery-loop/SKILL.md"
    capsule: "skills/recovery-loop/capsule.yaml"
  - name: "python-analysis"
    path: "skills/python-analysis/SKILL.md"
    capsule: "skills/python-analysis/capsule.yaml"
  - name: "python-implementation"
    path: "skills/python-implementation/SKILL.md"
    capsule: "skills/python-implementation/capsule.yaml"
  - name: "pytest-generator"
    path: "skills/pytest-generator/SKILL.md"
    capsule: "skills/pytest-generator/capsule.yaml"
  - name: "pytest-runner"
    path: "skills/pytest-runner/SKILL.md"
    capsule: "skills/pytest-runner/capsule.yaml"
  - name: "code-review"
    path: "skills/code-review/SKILL.md"
    capsule: "skills/code-review/capsule.yaml"
  - name: "security-scan"
    path: "skills/security-scan/SKILL.md"
    capsule: "skills/security-scan/capsule.yaml"
  - name: "docs-update"
    path: "skills/docs-update/SKILL.md"
    capsule: "skills/docs-update/capsule.yaml"
hooks:
  - name: "pre-run"
    path: "hooks/hooks.yaml"
